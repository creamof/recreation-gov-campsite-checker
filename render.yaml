# Render blueprint: deploy Trailhead.
#
# In the Render dashboard: New → Blueprint → point at this repo. Render reads
# this file, builds app/Dockerfile, and gives you an HTTPS URL — which is
# required for PWA install, notifications, and web push.
#
# Currently pinned to the FREE plan so you can see it live with no card on
# file. Two things that means:
#   1. No persistent disk (Render disks require a paid plan) — watch data
#      lives in the container's ephemeral storage and resets on every
#      restart/redeploy.
#   2. Free services spin down after ~15 min idle, which pauses the
#      cancellation watcher's background poller until the next request
#      wakes it back up.
# Both are fine for trying the app out. When you're ready to actually rely on
# the watcher: change `plan: free` to `plan: starter` below and uncomment the
# `disk:` block — that's the only change needed for always-on + persistence.

services:
  - type: web
    name: trailhead
    runtime: docker
    plan: free
    dockerfilePath: app/Dockerfile
    dockerContext: app
    healthCheckPath: /api/health
    # disk:
    #   name: trailhead-data
    #   mountPath: /data
    #   sizeGB: 1
    envVars:
      - key: TRAILHEAD_DATA_DIR
        value: /data
      - key: TRAILHEAD_WATCH_INTERVAL
        value: "300"
      # Optional — uncomment and fill in to enable closed-app web push:
      # - key: TRAILHEAD_VAPID_PUBLIC_KEY
      #   sync: false
      # - key: TRAILHEAD_VAPID_PRIVATE_KEY
      #   sync: false
      # - key: TRAILHEAD_VAPID_EMAIL
      #   sync: false
      # Optional — Claude-powered concierge parsing:
      # - key: ANTHROPIC_API_KEY
      #   sync: false
